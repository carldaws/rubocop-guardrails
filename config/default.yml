Guardrails/ControllerInstanceVariables:
  Enabled: true
  Description: 'Flags controller actions with too many instance variables.'
  Max: 1
  Include:
    - 'app/controllers/**/*.rb'

Guardrails/ControllerTransaction:
  Enabled: true
  Description: 'Flags transaction blocks in controllers.'
  Include:
    - 'app/controllers/**/*.rb'

Guardrails/NoGuardClauses:
  Enabled: true
  Description: 'Discourages guard clauses (conditional early returns).'
  MinMethodLength: 10

Guardrails/NoInlineAuthorization:
  Enabled: true
  Description: 'Flags inline authorization checks in controller actions.'
  Include:
    - 'app/controllers/**/*.rb'

Guardrails/NoTestStrings:
  Enabled: true
  Description: 'Prevents string literals in test assertions and finders.'
  Include:
    - 'test/**/*.rb'

Guardrails/ShallowJob:
  Enabled: true
  Description: 'Flags job perform methods with too many statements.'
  MaxStatements: 2
  Include:
    - 'app/jobs/**/*.rb'

Guardrails/StandardAppDirectories:
  Enabled: true
  Description: 'Prevents non-standard directories under app/.'
  AllowedDirectories:
    - channels
    - controllers
    - helpers
    - jobs
    - mailers
    - mailboxes
    - models
    - views
  Include:
    - 'app/**/*.rb'

Guardrails/RestfulActions:
  Enabled: true
  Description: 'Prevents non-RESTful controller actions.'
  Include:
    - 'app/controllers/**/*.rb'

Guardrails/RestfulRoutes:
  Enabled: true
  Description: 'Detects non-RESTful route definitions.'
  Include:
    - 'config/routes.rb'
    - 'config/routes/**/*.rb'
